name: Update My Configs

on:
  schedule:
    - cron: '0 * * * *' # Запуск ровно каждый час
  workflow_dispatch: # Кнопка для ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Process Configs
        run: |
          # 1. Собираем сырые данные из источников
          curl -sL --max-time 15 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > raw_list.txt || true
          curl -sL --max-time 15 "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true
          curl -sL --max-time 15 "https://github.com/FLEXIY0/matryoshka-vpn/raw/main/configs/russia_whitelist.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true
          
          # 2. Мощный Python-скрипт (Фильтрация + Иконки + Нумерация)
          python3 - <<EOF
          import socket
          import re
          import base64
          import json
          import urllib.parse
          from concurrent.futures import ThreadPoolExecutor

          # Регулярка для поиска флагов стран
          FLAGS_RE = re.compile(r'[\U0001F1E6-\U0001F1FF]{2}')

          def get_host_port(link):
              try:
                  if link.startswith('vmess://'):
                      data = json.loads(base64.b64decode(link[8:]).decode('utf-8'))
                      return data.get('add'), int(data.get('port'))
                  match = re.search(r'@([^:/?#\s]+):(\d+)', link)
                  if match:
                      return match.group(1), int(match.group(2))
              except: pass
              return None, None

          def check_link(link):
              host, port = get_host_port(link)
              if not host or not port: return None
              try:
                  # Проверка доступности (фильтрация)
                  with socket.create_connection((host, port), timeout=2.5):
                      return link
              except: return None

          def rename_link(link, index):
              original_name = ""
              if link.startswith('vmess://'):
                  try:
                      data = json.loads(base64.b64decode(link[8:]).decode('utf-8'))
                      original_name = data.get('ps', '')
                  except: pass
              elif '#' in link:
                  original_name = urllib.parse.unquote(link.split('#')[1])
              
              # Вытаскиваем флаг или ставим глобус
              flag_match = FLAGS_RE.findall(original_name)
              flag = flag_match[0] + " " if flag_match else "🌐 "
              new_name = f"{flag}Gh0st_WhiteList #{index}"

              if link.startswith('vmess://'):
                  try:
                      data = json.loads(base64.b64decode(link[8:]).decode('utf-8'))
                      data['ps'] = new_name
                      return "vmess://" + base64.b64encode(json.dumps(data).encode('utf-8')).decode('utf-8')
                  except: return link
              
              base = link.split('#')[0]
              return f"{base}#{urllib.parse.quote(new_name)}"

          with open('raw_list.txt', 'r') as f:
              unique_links = list(dict.fromkeys([l.strip() for l in f if l.strip()]))

          # Сама фильтрация (проверка живых серверов)
          with ThreadPoolExecutor(max_workers=50) as executor:
              valid_links = list(filter(None, executor.map(check_link, unique_links)))

          final_configs = [rename_link(link, i+1) for i, link in enumerate(valid_links)]

          # Формируем файл list.txt (ВАЖНО ДЛЯ БОТА!)
          with open('list.txt', 'w') as f:
              f.write(f"# Количество рабочих: {len(final_configs)}\n")
              f.write(f"# Last Update: \$(date +'%d.%m.%Y %H:%M') (MSK)\n")
              f.write(f"# profile-title: 🏳️ Gh0st_WhiteList 🏳️\n")
              f.write(f"# profile-update-interval: 1\n\n")
              f.write('\n'.join(final_configs))
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add list.txt
          # Коммитим только если есть изменения
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: fixed counter and icons" && git push)
