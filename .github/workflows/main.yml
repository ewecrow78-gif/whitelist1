name: Update My Configs
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Combine
        run: |
          # 1. Скачиваем первую ссылку, удаляем первые 6 строк и оставляем ТОЛЬКО строки с vless/ss/trojan
          curl -sL "https://raw.githubusercontent.com" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > list.txt
          
          # 2. Добавляем вторую ссылку, также фильтруем только нужные протоколы
          curl -sL "https://raw.githubusercontent.com" | grep -E "^(vless|ss|trojan|vmess)://" >> list.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add list.txt
          git commit -m "Update configs" || exit 0
          git push
