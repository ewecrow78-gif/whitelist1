<!doctype html>

<style>

  .btn { display: inline-block; padding: .6rem 1rem; border-radius: .6rem; border: 1px solid #ccc; text-decoration: none; color: #000; }

<div class="box">
  <h1>Открываем Happ…</h1>
  <p class="muted">Если не открылось автоматически — нажмите кнопку ниже.</p>
  <p><a id="open" class="btn" href="#" rel="noopener">Открыть в Happ</a></p>
  <p><a id="store" class="btn" href="#" rel="noopener" style="display:none">Открыть магазин</a></p>

<script>
  // Ваша новая ссылка
  const RAW = "happ://crypt5/rkwiNPe9LxEm9PbM2r15Pl9NvG0DlPZ1SCpmGNdVWDvwRkwj+hmcQEcuwk5OOinb4yDoXhpUJolsOwcl9dbudz4zigB8h1MiLIui+TIS3Zq3L8tdm7XgjE0tfAqnyf6udsyeK2BTNac4Hv+1L/fNuLgCL/xZ+Dy5zUDGUB7M==Ogrwd+75twA3/2PWJNMLDiDIh4mnmE2rY+ FASoPYO9wqEyNPC3YD3YXJqhfEO9sjhEiKiveFDoNQDBbqnVyX4W81gwLsNWzBZCw1I+BVfpzbP2D3qOg194gLV01g/MnsqmIEVCKRDXlYEou YkqDhWSnOq+OHWF8uOnVn5gEWLks0rA3bWxjOI2x6IUZEwThPzaQk13AYvvy7kPfzMqcf5ALq/mXO8dNtYOITjQm9oJAHSuFeGTq4UBXJI+5A PDd120kHER7wCYVAYgNSq+FXmeGxQgaHquweJs/fQonGhpCuexzPcI45pu3KZgZ+fu5kTRCNAIc28TvfIvU9P90vVBMfTPIOY4X5y9fz3LAwugKO1RisGIz/WYpMUb1+Vj9LvmSM3nB3OU9AYRFdEY22k1ekfLc6KVKASJejy2A6Us9azfnjkbu2LMlg/UrLxwdGkMoTGdA4DlGkNzxx2PUwLc EHDNJYfr6eeyrXYpCsX0cU6KdGkkRQS2f8DbijvW50rOL6gN8h9BeGbVB3Atw9SX8Q5/M1W2JCJUM7K6IN2tyJfA40qc/N+zdHStrrutWCu4t HJveYMOa3QAS/rt4lJAAOzZpszRzUXB2bueI3+Nk9XB/Lb8cAk0TNplD/ij6KwB9C0DRQ7BMz8Ei/SukIXH+RVl9+TrHhb8PI+GFOQU=R5ggxl";

  const ua = navigator.userAgent || '';
  const isAndroid = /Android/i.test(ua);

  // Проверка формата ссылки (поддерживает crypt4 и crypt5)
  if (!/^happ:\/\/crypt[45]\//i.test(RAW)) {
    document.body.innerHTML = '<p style="color:#c00">Неверная ссылка.</p>';
    throw 0;
  }

  const PLAY = 'https://play.google.com/store/apps/details?id=com.happproxy';
  const APPSTORE = 'https://apps.apple.com/app/id6504287215';

  const payload = RAW.replace(/^happ:\/\//i, '');
  const INTENT = 'intent://' + payload + '#Intent;scheme=happ;package=com.happproxy;S.browser_fallback_url=' + encodeURIComponent(PLAY) + ';end';

  const openBtn = document.getElementById('open');
  const storeBtn = document.getElementById('store');

  openBtn.href = isAndroid ? INTENT : RAW;
  storeBtn.href = isAndroid ? PLAY : APPSTORE;

  if (!isAndroid) storeBtn.style.display = 'inline-block';

  let cancelled = false;
  ['visibilitychange', 'pagehide', 'blur'].forEach(ev => {
    addEventListener(ev, () => { cancelled = true }, { once: true });
  });

  // Автоматический переход
  setTimeout(() => {
    if (!cancelled) location.href = openBtn.href;
  }, 80);
</script>
