name: Update My Configs
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Combine
        run: |
          # 1. Скачиваем, удаляем первые 6 строк и все пустые строки
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | sed '/^$/d' > temp.txt
          
          # 2. Добавляем вторую ссылку без пустых строк
          curl -sL "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | sed '/^$/d' >> temp.txt
          
          # 3. ПРЕВРАЩАЕМ ВСЁ В BASE64 (это решит проблему с Happ)
          cat temp.txt | base64 -w 0 > list.txt
          
          # Удаляем временный файл
          rm temp.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add list.txt
          git commit -m "Update configs" || exit 0
          git push
