name: Update My Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Process Configs
        run: |
          # 1. Сбор данных
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > raw_list.txt || true
          curl -sL "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true
          curl -sL "https://github.com/FLEXIY0/matryoshka-vpn/raw/main/configs/russia_whitelist.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true

          # 2. Python-скрипт (Только сбор и переименование)
          python3 - <<EOF
          import re, base64, json, urllib.parse, os

          FLAGS_RE = re.compile(r'[\U0001F1E6-\U0001F1FF]{2}')

          def decode_vmess(s):
              try: return json.loads(base64.b64decode(s + '=' * (-len(s) % 4)).decode('utf-8'))
              except: return None

          with open('raw_list.txt', 'r') as f:
              u = list(dict.fromkeys([line.strip() for line in f if line.strip()]))

          tg_channel = "https://t.me/whitelistGh0st"
          repo_url = "https://github.com/ewecrow78-gif/whitelist1 "
          
          final = []
          info_label = f"📢 TG: @whitelistGh0st | {len(u)} Configs"
          final.append(f"vless://ghost@127.0.0.1:443?encryption=none&security=none#{urllib.parse.quote(info_label)}")

          for i, link in enumerate(u):
              old_name = ""
              if link.startswith('vmess://'):
                  d = decode_vmess(link[8:])
                  if d: old_name = d.get('ps', '')
              elif '#' in link:
                  parts = link.split('#')
                  old_name = urllib.parse.unquote(parts[1]) if len(parts) > 1 else ""
              
              f_flags = FLAGS_RE.findall(old_name)
              icon = f_flags[0] if f_flags else "🌐"
              new_ps = f"{icon} Gh0st_WhiteList #{i+1}"

              if link.startswith('vmess://'):
                  d = decode_vmess(link[8:])
                  if d:
                      d['ps'] = new_ps
                      final.append("vmess://" + base64.b64encode(json.dumps(d).encode('utf-8')).decode('utf-8'))
              else:
                  clean_url = link.split('#')[0]
                  final.append(f"{clean_url}#{urllib.parse.quote(new_ps)}")

          with open('list.txt', 'w', encoding='utf-8') as f:
              f.write(f"# profile-title: 🏳️ Gh0st_WhiteList 🏳️\n")
              f.write(f"# profile-web-page: {repo_url}\n")
              f.write(f"# support-url: {tg_channel}\n")
              f.write(f"# profile-update-interval: 1\n")
              f.write(f"# subscription-userinfo: upload=0; download=0; total=854347202560000; expire=0\n")
              f.write(f"# Всего конфигов: {len(final)-1}\n\n")
              f.write('\n'.join(final))

          with open('status.json', 'w', encoding='utf-8') as f:
              json.dump({"count": f"{len(final)-1} шт"}, f)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          # Добавляем все три файла (list.txt, status.json и README.md если правили)
          git add list.txt status.json
          git commit -m "Auto-update: $(date +'%d.%m %H:%M') | Total: $(grep -c '^[^#]' list.txt || echo 0)" || exit 0
          git push origin main
