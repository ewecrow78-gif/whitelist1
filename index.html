<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Настройка...</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .btn { display: inline-block; padding: 20px 30px; border-radius: 15px; background: #007aff; color: #fff; text-decoration: none; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>

<div>
    <p>Нажми кнопку для импорта в Happ:</p>
    <a id="link" class="btn" href="#">ЗАПУСТИТЬ ИМПОРТ</a>
</div>

<script>
    const CONFIG_URL = "https://raw.githubusercontent.com/ewecrow78-gif/whitelist1/main/list.txt";
    const encodedUrl = encodeURIComponent(CONFIG_URL);

    // Список всех возможных ID приложения Happ
    // Мы пробуем их по очереди, пока одно не сработает
    const packageIds = [
        "com.happ.android", 
        "com.happproxy", 
        "app.happ.com",
        "com.happ.v2ray"
    ];

    const linkElem = document.getElementById('link');

    // Формируем "магическую" ссылку Intent
    // Она заставляет Android искать приложение по ID
    function getIntent(pkg) {
        return `intent://import/${encodedUrl}#Intent;scheme=happ;package=${pkg};S.browser_fallback_url=https://play.google.com/store/apps/details?id=${pkg};end`;
    }

    // При клике пробуем первый ID, если не пойдет - предложим другие
    linkElem.href = getIntent(packageIds[0]);

    // Авто-попытка через 1 секунду
    setTimeout(() => {
        window.location.href = getIntent(packageIds[0]);
    }, 1000);
</script>

</body>
</html>
