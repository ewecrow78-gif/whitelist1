<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение Happ</title>
    <script>
        // 1. Ссылка на ваш файл с конфигами (RAW формат)
        const rawConfigUrl = "https://github.com/ewecrow78-gif/whitelist1/blob/main/list.txt";
        
        // 2. Глубинная ссылка для открытия в приложении Happ
        // Используем стандартный протокол импорта подписки
        const deepLink = "happ://import/" + encodeURIComponent(rawConfigUrl);

        // 3. Куда отправить пользователя, если приложение не установлено
        const downloadUrl = "https://play.google.com/store/apps/details?id=com.happproxy&hl=ru"; 

        function tryConnect() {
            // Пытаемся запустить приложение
            window.location.href = deepLink;

            // Если через 2.5 секунды пользователь все еще здесь — значит приложения нет
            setTimeout(function() {
                if (!document.hidden) {
                    if (confirm("Похоже, Happ не установлен. Перейти к скачиванию?")) {
                        window.location.href = downloadUrl;
                    }
                }
            }, 2500);
        }

        // Запускаем процесс автоматически при открытии страницы
        window.onload = tryConnect;
    </script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000; color: #fff; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; text-align: center;
        }
        .container { padding: 20px; border-radius: 20px; background: #1a1a1a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .loader { border: 3px solid #333; border-top: 3px solid #007aff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; }
        .btn { margin-top: 25px; display: inline-block; padding: 12px 24px; background: #007aff; color: #fff; text-decoration: none; border-radius: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Настройка конфигурации</h1>
        <p>Пытаемся открыть Happ и добавить подписку...</p>
        <a href="javascript:tryConnect()" class="btn">Открыть вручную</a>
    </div>
</body>
</html>
