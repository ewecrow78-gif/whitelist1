<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Импорт конфигов в Happ</title>
    <script>
        // Ваша прямая ссылка на файл с конфигами
        const configUrl = "https://raw.githubusercontent.com/ewecrow78-gif/whitelist1/main/list.txt";
        
        // ВАРИАНТ 1: Стандартный импорт через протокол v2rayng (Happ его понимает)
        const linkV2ray = "v2rayng://install-config?url=" + encodeURIComponent(configUrl);
        
        // ВАРИАНТ 2: Прямой импорт Happ (если первый не подхватит)
        const linkHapp = "happ://import/" + encodeURIComponent(configUrl);

        function startImport() {
            // Сначала пробуем v2rayng-совместимый импорт
            window.location.href = linkV2ray;

            // Через секунду пробуем специфичный для Happ, если первый не открылся
            setTimeout(() => {
                window.location.href = linkHapp;
            }, 1000);

            // Если через 4 секунды мы всё еще тут — отправляем в маркет
            setTimeout(() => {
                if (!document.hidden) {
                    window.location.href = "https://play.google.com/store/apps/details?id=com.happproxy&hl=ru";
                }
            }, 4000);
        }

        window.onload = startImport;
    </script>
</head>
<body style="background: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif;">
    <div style="text-align: center;">
        <h2>🔄 Настройка подписки...</h2>
        <p>Приложение должно открыться автоматически.</p>
        <button onclick="startImport()" style="padding: 10px 20px; border-radius: 8px; border: none; background: #007bff; color: white; cursor: pointer;">
            Импортировать вручную
        </button>
    </div>
</body>
</html>
