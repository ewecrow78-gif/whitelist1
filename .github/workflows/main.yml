name: Update My Configs
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Combine
        run: |
          # 1. Скачиваем первую ссылку и пропускаем 6 строк заголовка
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 > list.txt
          
          # 2. Добавляем пустую строку (безопасно)
          echo "" >> list.txt
          
          # 3. Добавляем вторую ссылку без изменений
          curl -sL "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" >> list.txt
          
          # 4. Финальная очистка: удаляем пустые строки, чтобы Happ не ругался
          sed -i '/^[[:space:]]*$/d' list.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add list.txt
          git commit -m "Update configs" || exit 0
          git push
