name: Check Servers Hourly

on:
  schedule:
    - cron: '0 * * * *' # Запуск каждый час
  workflow_dispatch: # Позволяет запустить вручную кнопкой

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run cleaner
        run: python cleaner.py

      - name: Commit and Push
        run: |
          git config --global user.name "CleanerBot"
          git config --global user.email "actions@github.com"
          git add list.txt
          git commit -m "Auto-removed dead servers" || exit 0
          git push
