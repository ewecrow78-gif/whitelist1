<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Открываем Happ…</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
            padding: 24px;
            line-height: 1.5;
            background-color: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            max-width: 480px;
            width: 100%;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1a1a1a; }
        .muted { opacity: .7; font-size: 0.95rem; margin-bottom: 24px; color: #666; }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: 1px solid #007bff;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #0056b3; }
        .btn-store {
            margin-top: 12px;
            background-color: transparent;
            color: #555;
            border-color: #ccc;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Открываем Happ…</h1>
    <p class="muted">Если приложение не открылось автоматически — нажмите кнопку ниже.</p>
    
    <p><a id="open" class="btn" href="#" rel="noopener">Открыть в Happ</a></p>
    <p><a id="store" class="btn btn-store" href="#" rel="noopener" style="display:none">Открыть магазин</a></p>
</div>

<script>

    const RAW = RAW_SOURCE.replace(/\s/g, ''); // Удаляем пробелы
    const ua = navigator.userAgent || '';
    const isAndroid = /Android/i.test(ua);

    // Проверка схемы
    if(!/^happ:\/\/crypt5\//i.test(RAW)){
        document.body.innerHTML = '<p style="color:#c00; text-align:center; margin-top:50px;">Неверная ссылка или формат.</p>';
        throw 0;
    }

    const PLAY = 'https://play.google.com/store/apps/details?id=com.happproxy';
    const APPSTORE = 'https://apps.apple.com/app/id6504287215';

    const payload = RAW.replace(/^happ:\/\//i, '');
    const INTENT = 'intent://' + payload + '#Intent;scheme=happ;package=com.happproxy;S.browser_fallback_url=' + encodeURIComponent(PLAY) + ';end';

    const openBtn = document.getElementById('open');
    const storeBtn = document.getElementById('store');

    openBtn.href = isAndroid ? INTENT : RAW;
    storeBtn.href = isAndroid ? PLAY : APPSTORE;

    if(!isAndroid) storeBtn.style.display = 'inline-block';

    let cancelled = false;
    ['visibilitychange', 'pagehide', 'blur'].forEach(ev => {
        window.addEventListener(ev, () => { cancelled = true; }, { once: true });
    });

    // Автоматический редирект через 100мс
    setTimeout(() => {
        if(!cancelled) {
            window.location.href = openBtn.href;
        }
    }, 100);
</script>

</html>
