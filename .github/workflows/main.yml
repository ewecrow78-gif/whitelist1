name: Update My Configs

on:
  schedule:
    - cron: '0 */3 * * *' # Запуск каждые 3 часа
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Download, Ping Check and Combine
        run: |
          # 1. Скачиваем все конфиги в один временный файл
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > raw_list.txt
          curl -sL "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt
          
          # Удаляем дубликаты сразу
          sort -u raw_list.txt -o raw_list.txt

          # 2. Встроенный Python-скрипт для проверки доступности портов (Пинг)
          python3 - <<EOF
          import socket
          import re

          def is_alive(host, port):
              try:
                  with socket.create_connection((host, port), timeout=3):
                      return True
              except:
                  return False

          with open('raw_list.txt', 'r') as f:
              links = f.readlines()

          alive_configs = []
          for link in links:
              link = link.strip()
              if not link: continue
              
              # Ищем хост и порт в ссылке
              match = re.search(r'@([^:]+):(\d+)', link)
              if match:
                  host, port = match.group(1), int(match.group(2))
                  if is_alive(host, port):
                      alive_configs.append(link)
              else:
                  # Если это не ссылка на сервер (редко), просто оставляем
                  alive_configs.append(link)

          with open('clean_configs.txt', 'w') as f:
              f.write('\n'.join(alive_configs))
          EOF

          # 3. Собираем данные для шапки из проверенного списка
          COUNT=$(wc -l < clean_configs.txt)
          DATE=$(TZ="Europe/Moscow" date +"%Y-%m-%d / %H:%M")

          # 4. Формируем финальный файл list.txt
          echo "# profile-title: 🏳️ Gh0st_VPN 🏳️ " > list.txt
          echo "# profile-update-interval: 3" >> list.txt
          echo "# Date/Time: $DATE (Moscow)" >> list.txt
          echo "# Количество рабочих: $COUNT" >> list.txt
          echo "# Источники: igareck & zieng2 + Auto-Ping" >> list.txt
          echo "" >> list.txt
          cat clean_configs.txt >> list.txt

          # Удаляем мусор
          rm raw_list.txt clean_configs.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add list.txt
          # Пушим только если список изменился
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update & Ping configs ($(TZ="Europe/Moscow" date +"%H:%M"))" && git push)
