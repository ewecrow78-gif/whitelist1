<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gh0st Redir</title>
    <script>
        // Твоя ссылка на конфиги
        const configUrl = "https://raw.githubusercontent.com/ewecrow78-gif/whitelist1/main/list.txt";
        
        // Ссылка для Happ (используем протокол hiddify)
        const happLink = "hiddify://install-config?url=" + encodeURIComponent(configUrl);

        // Функция автоматического перехода
        window.onload = function() {
            // Если через 2 секунды не перекинуло, показываем кнопку
            setTimeout(() => {
                document.getElementById('manual').style.display = 'block';
            }, 2000);
            
            // Пытаемся открыть Happ
            window.location.href = happLink;
        }
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; font-family:sans-serif; padding-top:100px;">
    <div id="loader">
        <h2>🚀 Подключаем Gh0st_WhiteList...</h2>
        <p>Сейчас откроется приложение Happ</p>
    </div>
    
    <div id="manual" style="display:none;">
        <p>Если приложение не открылось автоматически:</p>
        <a href="hiddify://install-config?url=https://raw.githubusercontent.com/ewecrow78-gif/whitelist1/main/list.txt" 
           style="padding:15px 30px; background:#800080; color:#fff; text-decoration:none; border-radius:10px; font-weight:bold;">
           ОТКРЫТЬ HAPP ВРУЧНУЮ
        </a>
    </div>
</body>
</html>
