<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Opening Happ…</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
      padding: 24px;
      line-height: 1.5;
      text-align: center;
    }
    .box {
      max-width: 720px;
      margin: auto;
    }
    .muted {
      opacity: .7;
      margin-bottom: 20px;
    }
    .btn {
      display: inline-block;
      padding: .6rem 1.2rem;
      border-radius: .6rem;
      border: 1px solid #ccc;
      text-decoration: none;
      color: #333;
      background: #f9f9f9;
      margin: 5px;
    }
    .btn:hover {
      background: #eee;
    }
  </style>
</head>
<body>
<div class="box">
  <h1>Открываем Happ…</h1>
  <p class="muted">Если приложение не открылось автоматически — нажмите кнопку ниже.</p>
  <p><a id="open" class="btn" href="#" rel="noopener">Открыть в Happ</a></p>
  <p><a id="store" class="btn" href="#" rel="noopener" style="display:none">Открыть магазин</a></p>
</div>

<script>
  // Ваша новая ссылка
  const RAW = "happ://crypt5/rkwiOzCGNGlGfVy12o157AslZW40pykjOTOtFpaud3N2MfPEqOE6sTpu5MPCWyQjBRqSb0Epn82ajZwjGYBvOHcIEyXCqv72siKpS5WkjVXFZkRxGYWxPNku6WXDkrl5v3C2QwMNXJjgPtApaZkN9vG6rflvr73F99+P/dIz==6Qq1cMSsCWos2OInBMI3M0GULrclgfAIWhUIn3f3mP/oVYqivFhioJGupLPdIHSdQYqJtL7YIVGAbPH5JjkrMnQFF/omE5PBR2IYg2DFV+yiHD0V7ZoASpztZb+1pw0oBbfLK3ZS8cHIuWAbho4pehzyvrHkpCaoIpNmh0iYUYjSj7VTVT+EZnrHzIh/IEicXl2PvJOm5prmdWfAopqIqbgwozQuZp4qe5HmKHm5hDZVXMmKwii7ur+Q9hescJtFaH9ZZ79KwtSESeIsu8IUVrIosB1a7Ak7KWbJzK2CG14AWsn0hjMwJ5gOq0a0i+046CNtKPPaT81pUZQ+rV1jiymdm7V+X88lTIvndcv4UxO6Ukt9SD00nJvR1L2iTjJEQlW2iGZ1dg3UqrEWsENvBiw8MINQY++aFiXl9wh85cz0T5P6Jeb6z3ty9D9+rpcZNfcp2910bp/G1MME+yVOgm/VQOkk2X7QhPhlQKuB5Mhe5hXBdBx1EdmatQC+bs/nLszipdv/R7XB7o8JXGTdcqBY6/oMTZGCHSvaoA9AqGBwsKzg9mLpVgZMoDPq+2KH5MjiBXM3V7/DjofuNR4C5TFKAjEELfi/sC3cvGRU8aFeeJpy8xXaDKtzeoykdynIgxczD18UxKDLrstybdS9HRd0HP7IoMNi0qRtpQv/jz4=QOggxl";
  
  const ua = navigator.userAgent || '';
  const isAndroid = /Android/i.test(ua);
  const openBtn = document.getElementById('open');
  const storeBtn = document.getElementById('store');

  // Проверка корректности ссылки (теперь для crypt5)
  if (!/^happ:\/\/crypt5\//i.test(RAW)) {
    document.body.innerHTML = '<p style="color:#c00; margin-top:50px;">Неверная ссылка.</p>';
    throw 0;
  }

  const PLAY = 'https://play.google.com/store/apps/details?id=com.happproxy';
  const APPSTORE = 'https://apps.apple.com/app/id6504287215';
  
  const payload = RAW.replace(/^happ:\/\//i, '');
  const INTENT = 'intent://' + payload + '#Intent;scheme=happ;package=com.happproxy;S.browser_fallback_url=' + encodeURIComponent(PLAY) + ';end';

  // Настройка ссылок
  openBtn.href = isAndroid ? INTENT : RAW;
  storeBtn.href = isAndroid ? PLAY : APPSTORE;

  // Показываем кнопку магазина для iOS (как в оригинале)
  if (!isAndroid) storeBtn.style.display = 'inline-block';

  // Попытка автоматического перехода
  let cancelled = false;
  ['visibilitychange', 'pagehide', 'blur'].forEach(ev => {
    window.addEventListener(ev, () => { cancelled = true; }, { once: true });
  });

  setTimeout(() => {
    if (!cancelled) {
      window.location.href = openBtn.href;
    }
  }, 80);
</script>
