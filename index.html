<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройка Happ</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 90%; max-width: 400px; text-align: center; background: #1a1a1a; padding: 30px; border-radius: 25px; border: 1px solid #333; }
        .btn { display: block; width: 100%; padding: 20px 0; background: #007aff; color: #fff; text-decoration: none; border-radius: 15px; font-size: 18px; font-weight: bold; border: none; cursor: pointer; }
        .info { color: #888; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Импорт в Happ</h2>
    <p>Нажми на кнопку. Если предложит выбор — выбери **Happ**.</p>
    
    <button onclick="openHappOnly()" class="btn">ОТКРЫТЬ В HAPP</button>
    
    <div class="info">
        Ссылка: <br>
        <span style="word-break: break-all; color: #555;">https://raw.githubusercontent.com/.../list.txt</span>
    </div>
</div>

<script>
    function openHappOnly() {
        const rawUrl = "https://raw.githubusercontent.com/ewecrow78-gif/whitelist1/main/list.txt";
        
        // Оставляем ТОЛЬКО специфичный для Happ протокол
        const happLink = "happ://import/" + encodeURIComponent(rawUrl);

        const a = document.createElement('a');
        a.href = happLink;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Если через 5 секунд ничего не открылось, идем в маркет
        setTimeout(() => {
            if (document.hasFocus()) {
                window.location.href = "https://play.google.com/store/apps/details?id=com.happ.android";
            }
        }, 5000);
    }
</script>

</body>
</html>
