name: Update My Configs
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Combine
        run: |
          # 1. Скачиваем и фильтруем только конфиги во временный файл
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > temp_list.txt
          curl -sL "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> temp_list.txt
          
          # 2. Чистим: удаляем дубликаты и пустые строки
          sort -u temp_list.txt | sed '/^$/d; s/^[[:space:]]*//; s/[[:space:]]*$//' > clean_configs.txt

          # 3. Собираем данные для шапки
          COUNT=$(wc -l < clean_configs.txt)
          # Устанавливаем время МСК (UTC+3)
          DATE=$(date -d "+3 hours" +"%Y-%m-%d / %H:%M")

          # 4. Формируем финальный файл list.txt с шапкой
          echo "# profile-title: 🏳️ Gh0st_VPN | Белые списки" > list.txt
          echo "# profile-update-interval: 3" >> list.txt
          echo "# Date/Time: $DATE (Moscow)" >> list.txt
          echo "# Количество: $COUNT" >> list.txt
          echo "# Источники: igareck & zieng2" >> list.txt
          echo "" >> list.txt
          cat clean_configs.txt >> list.txt

          # Удаляем временные файлы
          rm temp_list.txt clean_configs.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "action@github.com"
          git add list.txt
          # Фиксируем изменения только если файл реально изменился
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update configs ($DATE)" && git push)
