<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost WhiteList Setup</title>
    <script>
        // Твоя прямая ссылка на конфиги
        const configUrl = "https://raw.githubusercontent.com/ewecrow78-gif/whitelist1/main/list.txt";
        const encodedUrl = encodeURIComponent(configUrl);
        const name = encodeURIComponent("Ghost_WL");

        // ТРИ ВАРИАНТА ССЫЛОК (Один из них должен запустить импорт)
        const links = [
            `happ://add-subscription?url=${encodedUrl}&name=${name}`, // Вариант 1 (Самый частый)
            `happ://import/${configUrl}`,                            // Вариант 2 (Упрощенный)
            `v2rayng://install-config?url=${encodedUrl}&name=${name}` // Вариант 3 (Универсальный)
        ];

        let attempt = 0;

        function tryNext() {
            if (attempt < links.length) {
                console.log("Пробуем вариант:", links[attempt]);
                window.location.href = links[attempt];
                attempt++;
                // Пробуем следующий вариант через 1.5 секунды, если страница не скрылась
                setTimeout(() => {
                    if (!document.hidden) tryNext();
                }, 1500);
            } else {
                // Если ничего не сработало — в маркет
                window.location.href = "https://play.google.com";
            }
        }

        window.onload = tryNext;
    </script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #222; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: inline-block; padding: 12px 24px; background: #007bff; color: #fff; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>Импорт в Happ...</h2>
        <p>Разрешите открытие приложения в запросе телефона</p>
        <a href="javascript:location.reload()" class="btn">Повторить попытку</a>
    </div>
</body>
</html>
