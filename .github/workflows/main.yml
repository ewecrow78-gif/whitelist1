name: Update My Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Process Configs
        run: |
          # 1. Сбор данных
          curl -sL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > raw_list.txt || true
          curl -sL "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true
          curl -sL "https://github.com/FLEXIY0/matryoshka-vpn/raw/main/configs/russia_whitelist.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true

          # 2. Python-скрипт с улучшенной сортировкой и очисткой
          python3 - <<EOF
          import socket, re, base64, json, time, urllib.parse, os
          from concurrent.futures import ThreadPoolExecutor

          FLAGS_RE = re.compile(r'[\U0001F1E6-\U0001F1FF]{2}')

          def decode_vmess(s):
              try: return json.loads(base64.b64decode(s + '=' * (-len(s) % 4)).decode('utf-8'))
              except: return None

          def get_hp(l):
              try:
                  if l.startswith('vmess://'):
                      d = decode_vmess(l[8:])
                      return (d.get('add'), int(d.get('port'))) if d else (None, None)
                  m = re.search(r'@([^:/?#\s]+):(\d+)', l)
                  return (m.group(1), int(m.group(2))) if m else (None, None)
              except: return None, None

          def check(l):
              h, p = get_hp(l)
              if not h: return None
              try:
                  s = time.time()
                  # Увеличиваем таймаут до 3.0 для стабильности на больших списках
                  with socket.create_connection((h, p), timeout=3.0):
                      ms = int((time.time()-s)*1000)
                      return (l, ms, h) # Возвращаем ссылку, пинг и хост для дедупликации
              except: return None

          # Читаем сырые данные
          with open('raw_list.txt', 'r') as f:
              u = list(dict.fromkeys([line.strip() for line in f if line.strip()]))

          # Проверка в 100 потоков
          with ThreadPoolExecutor(max_workers=100) as ex:
              checked_stuff = list(filter(None, ex.map(check, u)))

          # СОРТИРОВКА И ДЕДУПЛИКАЦИЯ
          # 1. Сортируем по пингу (от меньшего к большему)
          checked_stuff.sort(key=lambda x: x[1])

          final_res = []
          seen_hosts = set()

          for link, ms, host in checked_stuff:
              # Если такой IP уже есть в списке — пропускаем (экономим место и память телефона)
              if host in seen_hosts:
                  continue
              seen_hosts.add(host)
              final_res.append(link)

          tg_channel = "https://t.me/whitelistGh0st"
          repo_url = "https://github.com/ewecrow78-gif/whitelist1" # Твой репо
          
          final_configs = []
          # Инфо-плашка в начале списка
          info_label = f"📢 TG: @whitelistGh0st | {len(final_res)} Unique Online"
          final_configs.append(f"vless://ghost@127.0.0.1:443?encryption=none&security=none#{urllib.parse.quote(info_label)}")

          for i, link in enumerate(final_res):
              # Генерируем максимально легкое имя (чтобы v2rayNG не вис на отрисовке)
              new_ps = f"🌐 Gh0st #{i+1}"

              if link.startswith('vmess://'):
                  d = decode_vmess(link[8:])
                  if d:
                      d['ps'] = new_ps
                      # Очищаем от лишних полей, которые могут содержать "мусор"
                      essential = ["v","ps","add","port","id","aid","net","type","host","path","tls","sni","alpn"]
                      clean_d = {k: v for k, v in d.items() if k in essential}
                      final_configs.append("vmess://" + base64.b64encode(json.dumps(clean_d).encode('utf-8')).decode('utf-8'))
              else:
                  # Для VLESS/SS/Trojan отрезаем старое имя и ставим новое
                  clean_url = link.split('#')[0]
                  final_configs.append(f"{clean_url}#{urllib.parse.quote(new_ps)}")

          with open('list.txt', 'w', encoding='utf-8') as f:
              f.write(f"# profile-title: 🏳️ Gh0st_WhiteList 🏳️\n")
              f.write(f"# profile-web-page: {repo_url}\n")
              f.write(f"# support-url: {tg_channel}\n")
              f.write(f"# profile-update-interval: 1\n")
              f.write(f"# Всего уникальных рабочих: {len(final_res)}\n\n")
              f.write('\n'.join(final_configs))

          with open('status.json', 'w', encoding='utf-8') as f:
              json.dump({"count": f"{len(final_res)} уникальных рабочих"}, f)
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@://github.com"
          git add list.txt status.json
          git commit -m "Auto-update: $(date +'%d.%m %H:%M') | Total: $(grep -c '^[^#]' list.txt || echo 0)" || exit 0
          git push origin main

