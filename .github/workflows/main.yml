name: Update My Configs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Process Configs
        run: |
          # 1. Сбор данных
          curl -sL --max-time 15 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" | tail -n +7 | grep -E "^(vless|ss|trojan|vmess)://" > raw_list.txt || true
          curl -sL --max-time 15 "https://raw.githubusercontent.com/zieng2/wl/main/vless_lite.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true
          curl -sL --max-time 15 "https://github.com/FLEXIY0/matryoshka-vpn/raw/main/configs/russia_whitelist.txt" | grep -E "^(vless|ss|trojan|vmess)://" >> raw_list.txt || true
          
          # 2. Python скрипт (Чинит счетчик и переименовывает)
          python3 - <<EOF
          import socket
          import re
          import base64
          import json
          import urllib.parse
          from concurrent.futures import ThreadPoolExecutor

          def get_host_port(link):
              try:
                  if link.startswith('vmess://'):
                      data = json.loads(base64.b64decode(link[8:]).decode('utf-8'))
                      return data.get('add'), int(data.get('port'))
                  match = re.search(r'@([^:/?#\s]+):(\d+)', link)
                  if match:
                      return match.group(1), int(match.group(2))
              except: pass
              return None, None

          def check_link(link):
              host, port = get_host_port(link)
              if not host or not port: return None
              try:
                  with socket.create_connection((host, port), timeout=2.5):
                      return link
              except: return None

          def rename_link(link, index):
              new_name = f"Gh0st_WhiteList #{index}"
              if link.startswith('vmess://'):
                  try:
                      data = json.loads(base64.b64decode(link[8:]).decode('utf-8'))
                      data['ps'] = new_name
                      return "vmess://" + base64.b64encode(json.dumps(data).encode('utf-8')).decode('utf-8')
                  except: return link
              
              # Очищаем старые теги и добавляем Gh0st_WhiteList #N
              base = link.split('#')[0]
              return f"{base}#{urllib.parse.quote(new_name)}"

          with open('raw_list.txt', 'r') as f:
              unique_links = list(dict.fromkeys([l.strip() for l in f if l.strip()]))

          with ThreadPoolExecutor(max_workers=50) as executor:
              valid_links = list(filter(None, executor.map(check_link, unique_links)))

          final_configs = [rename_link(link, i+1) for i, link in enumerate(valid_links)]

          # ВАЖНО: Формат заголовка, который ищет твой бот
          with open('list.txt', 'w') as f:
              f.write(f"# Количество рабочих: {len(final_configs)}\n")
              f.write(f"# Обновлено: \$(date)\n\n")
              f.write('\n'.join(final_configs))
          EOF

      - name: Commit and Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add list.txt
          git commit -m "Auto-update: renamed and fixed counter" || exit 0
          git push origin main
